<!DOCTYPE html>
<html>

<head>
<title>Employee Pension Calculator</title>

<style>

body{
font-family: Arial, sans-serif;
background-color:#e9f0f7;
text-align:center;
margin-top:60px;
}

.container{
background:white;
width:350px;
margin:auto;
padding:25px;
border:1px solid #ccc;
border-radius:8px;
}

h2{
margin-bottom:20px;
}

label{
display:block;
text-align:left;
margin-top:10px;
}

input{
width:95%;
padding:8px;
margin-top:5px;
border:1px solid #aaa;
border-radius:4px;
}

button{
margin-top:20px;
padding:10px 15px;
background-color:#4CAF50;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

button:hover{
background-color:#45a049;
}

.result{
margin-top:20px;
font-weight:bold;
}

.error{
color:red;
}

</style>

</head>

<body>

<div class="container">

<h2>Employee Pension Calculator</h2>

<label>Employee Name</label>
<input type="text" id="name" placeholder="Enter employee name">

<label>Monthly Salary (₹)</label>
<input type="number" id="salary" placeholder="Enter salary">

<label>Years of Service</label>
<input type="number" id="service" placeholder="Enter years worked">

<button onclick="calculatePension()">Calculate Pension</button>

<div id="result" class="result"></div>

</div>

<script>

function calculatePension(){

let name = document.getElementById("name").value;
let salary = parseFloat(document.getElementById("salary").value);
let service = parseFloat(document.getElementById("service").value);

let result = document.getElementById("result");

/* Validation */

if(name=="" || isNaN(salary) || isNaN(service)){
result.innerHTML="Please fill all fields";
result.className="result error";
return;
}

if(salary<=0 || service<=0){
result.innerHTML="Salary and service must be greater than 0";
result.className="result error";
return;
}

if(service>40){
result.innerHTML="Service years cannot exceed 40";
result.className="result error";
return;
}

/* Pension Calculation */

let pension = salary * service * 0.015;

/* Display Result */

result.className="result";

result.innerHTML =
"Employee: " + name + "<br>" +
"Estimated Monthly Pension: ₹" + pension.toFixed(2);

}

</script>

</body>

</html>
